<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a0a0a"/>
    </linearGradient>
    <linearGradient id="red" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e50914"/>
      <stop offset="100%" style="stop-color:#b00610"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Red accent bar -->
  <rect x="0" y="0" width="8" height="630" fill="url(#red)"/>
  <!-- Red glow circle -->
  <ellipse cx="900" cy="315" rx="400" ry="350" fill="#e50914" opacity="0.06"/>
  <!-- VLTV Logo -->
  <text x="100" y="240" font-family="Arial Black, Arial" font-weight="900" font-size="96" fill="white">VLTV</text>
  <text x="410" y="240" font-family="Arial Black, Arial" font-weight="900" font-size="96" fill="#e50914">PLAY</text>
  <!-- Tagline -->
  <text x="100" y="310" font-family="Arial, sans-serif" font-weight="700" font-size="42" fill="#e50914" letter-spacing="3">O MELHOR DO STREAMING</text>
  <!-- Description -->
  <text x="100" y="375" font-family="Arial, sans-serif" font-weight="400" font-size="28" fill="#cccccc">Milhares de canais, filmes e séries em HD &amp; 4K</text>
  <text x="100" y="415" font-family="Arial, sans-serif" font-weight="400" font-size="28" fill="#cccccc">com estabilidade total. Teste grátis por 3 horas.</text>
  <!-- CTA pill -->
  <rect x="100" y="460" width="320" height="60" rx="30" fill="url(#red)"/>
  <text x="260" y="498" font-family="Arial, sans-serif" font-weight="700" font-size="22" fill="white" text-anchor="middle">Assinar Agora</text>
  <!-- Decorative dots -->
  <circle cx="1050" cy="150" r="6" fill="#e50914" opacity="0.5"/>
  <circle cx="1100" cy="200" r="4" fill="#e50914" opacity="0.3"/>
  <circle cx="1080" cy="480" r="8" fill="#e50914" opacity="0.4"/>
  <circle cx="1020" cy="520" r="5" fill="#e50914" opacity="0.25"/>
</svg>